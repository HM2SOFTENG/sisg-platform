name: Build and Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/sisg-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Starting deployment to sentinelintegratedgroup.com"

            # Navigate to app directory
            cd /app/sisg-platform

            # Stop running container
            docker-compose down || true

            # Pull latest code
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Create .env.production with secrets
            cat > .env.production << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            ADMIN_PIN=${{ secrets.ADMIN_PIN }}
            SLACK_ALERTS_WEBHOOK=${{ secrets.SLACK_ALERTS_WEBHOOK }}
            SLACK_FORMS_WEBHOOK=${{ secrets.SLACK_FORMS_WEBHOOK }}
            SLACK_ACTIVITY_WEBHOOK=${{ secrets.SLACK_ACTIVITY_WEBHOOK }}
            SLACK_DEPLOYMENTS_WEBHOOK=${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
            CLAWBOT_URL=${{ secrets.CLAWBOT_URL }}
            CLAWBOT_API_KEY=${{ secrets.CLAWBOT_API_KEY }}
            ENVEOF
            sed -i 's/^            //' .env.production

            # Rebuild and start containers with latest code
            docker-compose build --no-cache
            docker-compose up -d

            # Wait for container to start and pass health check
            sleep 15

            # Verify deployment - check both static and API
            curl -f http://localhost:3000/ || exit 1
            curl -f http://localhost:3000/api/health || exit 1

            # Clean up old images to save disk space
            docker image prune -f

            echo "✅ Deployment successful!"
            echo "🌐 Website available at: https://sentinelintegratedgroup.com"

      - name: Notify Slack on deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Site:* <https://sentinelintegratedgroup.com|sentinelintegratedgroup.com>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING

      - name: Notify Slack on deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING
