version: '3.8'

services:
  app:
    image: sisg-platform-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sisg-platform
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env.production
    volumes:
      - sisg-data:/app/data
    restart: unless-stopped
    # Healthcheck is defined in Dockerfile (single source of truth).
    # Do NOT add a healthcheck block here — compose overrides Dockerfile
    # HEALTHCHECK and has caused stale config issues in the past.

  # Optional: PostgreSQL (if using database)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: sisg-db
  #   environment:
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     POSTGRES_DB: ${DB_NAME}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Optional: Redis (if using caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: sisg-cache
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  sisg-data:
