version: '3.8'

services:
  app:
    image: sisg-platform-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sisg-platform
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env.production
    volumes:
      - sisg-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {let d=''; r.on('data',c=>d+=c); r.on('end',()=>{try{const j=JSON.parse(d);if(j.status!=='ok')process.exit(1);}catch{process.exit(1);}});}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Optional: PostgreSQL (if using database)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: sisg-db
  #   environment:
  #     POSTGRES_USER: ${DB_USER}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     POSTGRES_DB: ${DB_NAME}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Optional: Redis (if using caching)
  # redis:
  #   image: redis:7-alpine
  #   container_name: sisg-cache
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  sisg-data:
