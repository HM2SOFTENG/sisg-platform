name: Build and Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/sisg-platform

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to DigitalOcean Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "🚀 Starting deployment to sentinelintegratedgroup.com"

            # Navigate to app directory
            cd /app/sisg-platform

            # Ensure host paths needed by nginx/certbot exist
            sudo mkdir -p /var/www/certbot

            # Stop running containers
            docker-compose down || true

            # Stop system nginx if running (port 80 conflict with Docker nginx)
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true

            # Pull latest code (needed for docker-compose.yml and .env generation)
            git fetch origin
            git checkout main
            git reset --hard origin/main

            # Create .env.production with secrets
            cat > .env.production << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            ADMIN_PIN=${{ secrets.ADMIN_PIN }}
            SLACK_ALERTS_WEBHOOK=${{ secrets.SLACK_ALERTS_WEBHOOK }}
            SLACK_FORMS_WEBHOOK=${{ secrets.SLACK_FORMS_WEBHOOK }}
            SLACK_ACTIVITY_WEBHOOK=${{ secrets.SLACK_ACTIVITY_WEBHOOK }}
            SLACK_DEPLOYMENTS_WEBHOOK=${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
            CLAWBOT_URL=${{ secrets.CLAWBOT_URL }}
            CLAWBOT_API_KEY=${{ secrets.CLAWBOT_API_KEY }}
            GITHUB_TOKEN=${{ secrets.GH_AGENT_TOKEN }}
            SAM_GOV_API_KEY=${{ secrets.SAM_GOV_API_KEY }}
            NVD_API_KEY=${{ secrets.NVD_API_KEY }}
            ENVEOF
            sed -i 's/^            //' .env.production

            # Pull the pre-built image from Docker Hub (built by CI in job 1)
            # This is fast (~30s) vs building on droplet (~4-5min + OOM risk)
            docker pull ${{ secrets.DOCKER_USERNAME }}/sisg-platform:main

            # Tag it so docker-compose uses the pulled image
            docker tag ${{ secrets.DOCKER_USERNAME }}/sisg-platform:main sisg-platform-app:latest

            # --force-recreate ensures Docker re-reads docker-compose.yml and
            # creates a fresh container. The healthcheck is baked into the image
            # via Dockerfile HEALTHCHECK (docker-compose.yml has no healthcheck
            # block, so the Dockerfile's config is used as-is).
            docker-compose up -d --force-recreate

            # Ensure cert renewals reload the running nginx container
            sudo mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            sudo tee /etc/letsencrypt/renewal-hooks/deploy/reload-sisg-nginx.sh >/dev/null <<'HOOKEOF'
            #!/usr/bin/env bash
            set -e
            docker exec sisg-nginx nginx -s reload
            HOOKEOF
            sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-sisg-nginx.sh

            # Wait for the app container healthcheck to go green
            echo "Waiting for app container health..."
            ATTEMPTS=30
            until [ "$ATTEMPTS" -eq 0 ]; do
              APP_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' sisg-platform 2>/dev/null || true)
              if [ "$APP_HEALTH" = "healthy" ]; then
                break
              fi
              if [ "$APP_HEALTH" = "unhealthy" ] || [ "$APP_HEALTH" = "exited" ]; then
                echo "App container failed health checks: $APP_HEALTH"
                docker logs --tail 200 sisg-platform || true
                exit 1
              fi
              ATTEMPTS=$((ATTEMPTS - 1))
              sleep 5
            done

            APP_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' sisg-platform 2>/dev/null || true)
            [ "$APP_HEALTH" = "healthy" ] || {
              echo "App container did not become healthy in time: $APP_HEALTH"
              docker logs --tail 200 sisg-platform || true
              exit 1
            }

            # Verify nginx config and TLS assets are present
            test -f /etc/letsencrypt/live/sentinelintegratedgroup.com/fullchain.pem
            test -f /etc/letsencrypt/live/sentinelintegratedgroup.com/privkey.pem
            docker exec sisg-nginx nginx -t

            # Verify deployment via HTTPS and redirect behavior
            echo "Running health checks..."
            curl -fsS --max-time 15 --resolve sentinelintegratedgroup.com:443:127.0.0.1 https://sentinelintegratedgroup.com/api/health | grep -q '"status":"ok"'
            curl -fsS --max-time 15 --resolve www.sentinelintegratedgroup.com:443:127.0.0.1 https://www.sentinelintegratedgroup.com/api/health | grep -q '"status":"ok"'
            curl -fsSI --max-time 15 -H 'Host: sentinelintegratedgroup.com' http://127.0.0.1 | grep -qi '^location: https://sentinelintegratedgroup.com/'

            # Clean up old images to save disk space
            docker image prune -f

            echo "✅ Deployment successful!"
            echo "🌐 Website available at: https://sentinelintegratedgroup.com"

      - name: Notify Slack on deployment success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Deployment Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ Deployment Successful"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Site:* <https://sentinelintegratedgroup.com|sentinelintegratedgroup.com>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING

      - name: Notify Slack on deployment failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Deployment Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ Deployment Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENTS_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING
